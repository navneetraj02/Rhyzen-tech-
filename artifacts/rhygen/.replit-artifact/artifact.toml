kind = "web"
previewPath = "/"
title = "Rhygen"
version = "1.0.0"
id = "artifacts/rhygen"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 24172

[services.development]
run = "pnpm --filter @workspace/rhygen run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/rhygen", "run", "build" ]
publicDir = "artifacts/rhygen/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "24172"
BASE_PATH = "/"
